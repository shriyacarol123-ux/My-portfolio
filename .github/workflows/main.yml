name: NutriTrack-CI-Pipeline
on: [push]  # Runs every time you upload code

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install  # Installs Express and MySQL2

      - name: Run Linting Check
        run: npx eslint . --fix || true  # Runs your eslint.config.mjs logic

      - name: Build Verification
        run: echo "NutriTrack Build Successful"
